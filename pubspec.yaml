name: forge2d_game
description: "A new Flutter project."
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  characters: ^1.4.0
  flame: ^1.30.1
  flame_forge2d: ^0.19.0+4
  flame_kenney_xml: ^0.1.1+14
  xml: ^6.5.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon/icon_android.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
